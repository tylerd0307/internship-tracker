<!DOCTYPE html>
<html>
<head>
  <title>internship tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>internship tracker</h1>

  <button id="addBtn">+ add application</button>

  <div id="formContainer" style="display:none">
    <h2>add application</h2>
    <form id="appForm">
      <label>company: <input type="text" id="company" required></label>
      <label>role: <input type="text" id="role" required></label>
      <label>status:
        <select id="status">
          <option>Applied</option>
          <option>Interview</option>
          <option>Offer</option>
          <option>Rejected</option>
        </select>
      </label>
      <label>last contact: <input type="date" id="lastContact" required></label>
      <button type="submit">add</button>
      <button type="button" id="cancelBtn">cancel</button>
    </form>
  </div>

  <table>
    <thead>
      <tr>
        <th>company</th>
        <th>role</th>
        <th>status</th>
        <th>last contact</th>
        <th>follow-up</th>
      </tr>
    </thead>

    <tbody id="tableBody">
      <!-- data will go here -->
    </tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
